name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-report:
    name: Test Report
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    env:
      REPORT_ROOT: reports
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Configure FlakeHub Cache
        uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Check flake.lock health
        uses: DeterminateSystems/flake-checker-action@v2

      - name: Run flake checks and generate test report
        run: |
          mkdir -p "$REPORT_ROOT"
          nix run .#test-report -- --out-dir "$REPORT_ROOT" --verbose

      - name: Locate latest report directory
        if: ${{ always() }}
        id: latest_report
        run: |
          report_dir=""
          report_md=""

          if [ -d "$REPORT_ROOT" ]; then
            report_dir="$(find "$REPORT_ROOT" -mindepth 1 -maxdepth 1 -type d -name 'test-report-*' | sort | tail -n 1)"
          fi

          if [ -n "$report_dir" ] && [ -f "$report_dir/report.md" ]; then
            report_md="$report_dir/report.md"
          fi

          printf 'report_dir=%s\n' "$report_dir" >> "$GITHUB_OUTPUT"
          printf 'report_md=%s\n' "$report_md" >> "$GITHUB_OUTPUT"

      - name: Add test report to workflow summary
        if: ${{ always() }}
        env:
          REPORT_MD: ${{ steps.latest_report.outputs.report_md }}
        run: |
          report_md="$REPORT_MD"

          if [ -n "$report_md" ]; then
            cat "$report_md" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              printf "# pd-pki Test Report\n\n"
              printf "No \`report.md\` file was generated. Review the job logs for details.\n"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test report artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: pd-pki-test-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.REPORT_ROOT }}/
          if-no-files-found: warn
          retention-days: 14

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.latest_report.outputs.report_dir != '' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.latest_report.outputs.report_dir != '' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.latest_report.outputs.report_dir }}

  deploy-pages:
    name: Deploy Test Report Site
    if: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
    needs: test-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
