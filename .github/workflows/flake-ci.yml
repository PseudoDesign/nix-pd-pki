name: Flake CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: flake-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flake-check:
    name: Flake Check
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Configure FlakeHub Cache
        uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Check flake.lock health
        uses: DeterminateSystems/flake-checker-action@v2

      - name: Run flake checks
        run: nix flake check -L

      - name: Build hardware-lab system
        run: nix build -L .#nixosConfigurations.hardware-lab.config.system.build.toplevel
